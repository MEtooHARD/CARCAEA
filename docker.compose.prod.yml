
services:
  postgres:
    build: ./postgres
    container_name: ${DATABASE}
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${ARCAEA_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${ARCAEA_DB}"]
      interval: 8s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  server:
    build: ./server
    container_name: arcaea_api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${ARCAEA_DB}
      NODE_ENV: production
      AUDIO_STORAGE_PATH: ${AUDIO_STORAGE_PATH:-./storage/audio}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # (deprecated)
