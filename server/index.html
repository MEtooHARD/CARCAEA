<!DOCTYPE html>
<html>

<head>
    <title>YouTube Audio Downloader</title>
</head>

<body>
    <h1>YouTube Audio Downloader Test</h1>

    <div style="margin-bottom: 20px;">
        <label>YouTube URL:</label><br>
        <input type="url" id="youtubeUrl" value="https://youtu.be/9bZkp7q19f0"
            style="width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box;"><br>
        <button onclick="startDownload()" style="padding: 8px 16px;">Download</button>
    </div>

    <div style="margin-bottom: 10px; display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>IP/Host:</label><br>
            <input type="text" id="urlIp" style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;">
        </div>

        <div style="flex: 0.2;">
            <label>Port:</label><br>
            <input type="text" id="urlPort" style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;">
        </div>

        <div style="flex: 1.5;">
            <label>Route:</label><br>
            <input type="text" id="urlRoute"
                style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;">
        </div>
    </div>

    <div style="margin-bottom: 10px;">
        <label>Parameters:</label><br>
        <input type="text" id="urlParams"
            style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; background: #f0f0f0;">
    </div>

    <p>Status: <span id="statusBadge" style="font-weight: bold;">Ready</span></p>

    <div id="log"
        style="border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; word-wrap: break-word; background: #f9f9f9;">
        Waiting for download...
    </div>

    <script>
        let eventSource = null;

        // Configuration variables
        function getUrlConfig() {
            return {
                ip: document.getElementById('urlIp').value || window.location.hostname,
                port: document.getElementById('urlPort').value || '3001',
                route: document.getElementById('urlRoute').value || '/songs/upload/youtube',
                youtubeUrl: document.getElementById('youtubeUrl').value.trim()
            };
        }

        function updateTargetUrl() {
            const config = getUrlConfig();
            document.getElementById('urlIp').value = config.ip;
            document.getElementById('urlPort').value = config.port;
            document.getElementById('urlRoute').value = config.route;
            document.getElementById('urlParams').value = config.youtubeUrl ? `link=${config.youtubeUrl}` : '';
        }

        function buildApiUrl() {
            const config = getUrlConfig();
            const protocol = window.location.protocol;
            const encodedLink = encodeURIComponent(config.youtubeUrl);
            return `${protocol}//${config.ip}:${config.port}${config.route}?link=${encodedLink}`;
        }

        function addLog(msg) {
            const log = document.getElementById('log');
            log.textContent += '\n' + msg;
            log.scrollTop = log.scrollHeight;
        }

        function startDownload() {
            const url = document.getElementById('youtubeUrl').value.trim();

            if (!url) {
                alert('Please enter a YouTube URL');
                return;
            }

            const log = document.getElementById('log');
            log.textContent = '';
            document.getElementById('statusBadge').textContent = 'Downloading...';

            if (eventSource) {
                eventSource.close();
            }

            const apiUrl = buildApiUrl();

            addLog(`[${new Date().toLocaleTimeString()}] Starting download: ${url}`);

            eventSource = new EventSource(apiUrl);

            eventSource.addEventListener('start', (event) => {
                const data = JSON.parse(event.data);
                addLog(`[${new Date().toLocaleTimeString()}] 🚀 ${data.message}`);
            });

            eventSource.addEventListener('progress', (event) => {
                const data = JSON.parse(event.data);
                addLog(`[${new Date().toLocaleTimeString()}] ⏳ ${data.message}`);
            });

            eventSource.addEventListener('complete', (event) => {
                const data = JSON.parse(event.data);
                addLog(`[${new Date().toLocaleTimeString()}] ✅ ${data.message}`);
                document.getElementById('statusBadge').textContent = 'Complete!';
                eventSource.close();
            });

            eventSource.addEventListener('error', (event) => {
                try {
                    const data = JSON.parse(event.data);
                    addLog(`[${new Date().toLocaleTimeString()}] ❌ ${data.message}`);
                } catch {
                    // If not SSE event, try to read response body
                    if (event.data) {
                        try {
                            const jsonData = JSON.parse(event.data);
                            addLog(`[${new Date().toLocaleTimeString()}] ❌ ${JSON.stringify(jsonData, null, 2)}`);
                        } catch {
                            addLog(`[${new Date().toLocaleTimeString()}] ❌ ${event.data}`);
                        }
                    } else {
                        addLog(`[${new Date().toLocaleTimeString()}] ❌ Connection error`);
                    }
                }
                document.getElementById('statusBadge').textContent = 'Error';
                eventSource.close();
            });
        }

        document.getElementById('youtubeUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startDownload();
            }
        });

        // Update target URL on page load and when YouTube URL changes
        document.getElementById('urlIp').value = window.location.hostname;
        document.getElementById('urlPort').value = '3001';
        document.getElementById('urlRoute').value = '/songs/upload/youtube';
        updateTargetUrl();
        document.getElementById('youtubeUrl').addEventListener('input', updateTargetUrl);
    </script>
</body>

</html>
